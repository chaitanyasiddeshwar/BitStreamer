name: Release BitStreamer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-server-cross:
    name: Build Cross-Compiled Server Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.mod

      - name: Build Windows Binary
        run: |
          mkdir -p dist
          cd server
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/bitstreamer.exe .

      - name: Build Linux Binary
        run: |
          cd server
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/bitstreamer-linux .

      - name: Upload Cross Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-cross-binaries
          path: |
            dist/bitstreamer.exe
            dist/bitstreamer-linux

  build-server-mac:
    name: Build macOS Universal Server Binary
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.mod

      - name: Build macOS Universal Binary
        run: |
          mkdir -p dist
          cd server
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/bitstreamer-macos-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/bitstreamer-macos-amd64 .
          lipo -create -output ../dist/bitstreamer-macos ../dist/bitstreamer-macos-arm64 ../dist/bitstreamer-macos-amd64

      - name: Upload macOS Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-mac-binary
          path: dist/bitstreamer-macos

  build-client:
    name: Build Android TV Client APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd client
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Client APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-apk
          path: dist/client.apk

  publish:
    name: Create GitHub Release
    needs: [build-server-cross, build-server-mac, build-client]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows & Linux Server Binaries
        uses: actions/download-artifact@v4
        with:
          name: server-cross-binaries
          path: dist

      - name: Download macOS Server Binary
        uses: actions/download-artifact@v4
        with:
          name: server-mac-binary
          path: dist

      - name: Download Client APK
        uses: actions/download-artifact@v4
        with:
          name: client-apk
          path: dist

      - name: Convert Markdown to PDF
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: docs/USER_MANUAL.md
          output_dir: dist
          build_html: false

      - name: Create Release Zip
        run: |
          cd dist
          zip -r ../bitstreamer-${{ github.ref_name }}.zip ./*

      - name: List Release Files
        run: |
          ls -l bitstreamer-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bitstreamer-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
